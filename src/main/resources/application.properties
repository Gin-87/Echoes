spring.application.name=Echoes
spring.datasource.url=jdbc:mysql://localhost:3306/echoes?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=your_mysql_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jackson.serialization.indent_output=false

server.port=8080
spring.main.web-application-type=servlet
service.domain=http://localhost:8080

# 禁用视图后缀
spring.mvc.view.prefix=
spring.mvc.view.suffix=

# 配置消息转换
spring.mvc.contentnegotiation.favor-parameter=false
spring.mvc.contentnegotiation.media-types.json=application/json

logging.level.org.springframework.web.servlet.DispatcherServlet=TRACE
logging.level.org.springframework.security=TRACE
logging.level.org.apache.catalina.core=DEBUG
server.error.whitelabel.enabled=false

# ?? REST ???????
server.error.include-message=always
server.error.include-binding-errors=always
server.error.path=/error


# Python AI Service URL
python.service.url=http://localhost:8001

# Async thread pool
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=16
spring.task.execution.pool.queue-capacity=100

# Scheduler enable
spring.task.scheduling.pool.size=2
